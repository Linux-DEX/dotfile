source-file ~/.config/tmux/tmux.reset.conf

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setqc=\E[11::%p1%d;%p2%s\E\\' # underscore colors - needs tmux 3.0
set -g allow-passthrough on
set -g focus-events on

set -g status-style "bg=default,fg=default"
set -g mouse on
unbind C-b
set -g prefix ^A
bind ^A send-prefix

set -g base-index 1              
set -g pane-base-index 1
set -g detach-on-destroy off    
set -g escape-time 0           
set -g history-limit 1000000  
set -g renumber-windows on   
set -g set-clipboard on     
set -g status-position bottom
setw -g mode-keys vi

# Pane borders
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Plugin management
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/.tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin "christoomey/vim-tmux-navigator"
# set -g @plugin 'omerxx/tmux-sessionx' 
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

# Plugin configurations
# set -g @sessionx-bind 'o'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "#1e1e2e"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Status Line Optimization (Native tmux variables for speed)
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none] "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}]󰃭 %d-%m-%Y "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] %I:%M %p "

set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_blue}]  #S │}}"

set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_blue}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_blue}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g status-justify left
set -g window-status-current-format "#[fg=${active_window_fg},bold,bg=default]  #[underscore]#I:#W#[nounderscore] "
set -g window-status-current-style "bg=#{@thm_bg},fg=#{@thm_peach},bold"

# Popups
set -g popup-style "bg=default"
set -g popup-border-style "bg=default"

r
