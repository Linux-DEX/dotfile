[hostname]
ssh_only = false
format = '[у°Җ¶ M4](bold #5e1ef5) '
trim_at = "."
disabled = false

[character]                          
success_symbol = "[оҳө ](bold #5d3fd3)" 
error_symbol = "[вңҳ ](bold red)"

[directory]
read_only = " оӮў"
truncation_length = 10
truncate_to_repo = true 
truncation_symbol = "вҖҰ/"
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "оҢҪ  "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "
format = "В» [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
conflicted = "пҒұ "
ahead = "уұЎ® Г—${count} "
behind = "у°ҙ» Г—${count} "
diverged = "уұЎ·  уұЎ®  Г—${ahead_count} у°ҙ» Г—${behind_count} "
untracked = "у°Ҳӣ Г—${count} "
stashed = "оөө "
modified = "пҒҹ Г—${count} "
staged = "пҗ‘ Г—${count} "
renamed = "у°‘• Г—${count} "
deleted = "у°Ҷҙ Г—${count} "
style = "bright-white"
format = "$all_status$ahead_behind"

[golang]
style = 'blue'
format = "п„Ғ [$symbol GO ]($style)"
symbol = "оҳ§"

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "
format = 'В» [${symbol}java (\($virtualenv\) )]($style)'

[julia]
symbol = "оҳӨ "

[memory_usage]
symbol = "оҝ… "

[nim]
symbol = "оЎҒ "

[nix_shell]
symbol = "пӢң "

[package]
disabled = true

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "оҳҶ "
format = 'В» [${symbol}python (\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "пҜЈ "

[nodejs]
format = "В» [оҙҚ Node.js](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
