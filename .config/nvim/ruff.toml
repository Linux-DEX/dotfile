# Ruff configuration for 4-space indentation
# [format]
# indent-style = "space"
# indent-width = 4
# line-ending = "auto"
# quote-style = "preserve"
#
# [lint]
# select = ["E", "F", "W"]
# ignore = []


[format]
indent-style = "space"
indent-width = 4
line-ending = "auto"
quote-style = "preserve"
docstring-code-format = true

[lint]
select = [
    "E", 
    "W",
    "F",
    "I", 
    "N", 
    "UP",
    "B", 
    "C4",
    "RET", 
    "SIM", 
]

ignore = [
    "E501",
]

[lint.isort]
combine-as-imports = true

